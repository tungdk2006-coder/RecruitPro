{% extends "base.html" %}

{% block title %}Register - RecruitPro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 fw-bold">Candidate Registration</h3>
                
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    
                    <div class="row g-3">
                        <!-- Personal Info -->
                        <div class="col-md-6">
                            <h5 class="text-primary mb-3 border-bottom pb-2">Personal Information</h5>
                            
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label for="gender" class="form-label">Gender</label>
                                    <select class="form-select" id="gender" name="gender" required>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label for="dob" class="form-label">Date of Birth</label>
                                    <input type="date" class="form-control" id="dob" name="dob" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="tel" class="form-control" id="phone" name="phone" placeholder="0901234567" pattern="[0-9]{10}" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                            </div>
                            
                            <div class="mb-3">
                                <label for="address" class="form-label">Address</label>
                                <textarea class="form-control" id="address" name="address" rows="2"></textarea>
                            </div>
                        </div>
                        
                        <!-- Account & Professional Info -->
                        <div class="col-md-6">
                            <h5 class="text-primary mb-3 border-bottom pb-2">Professional & Account</h5>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="example@gmail.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="position-relative">
                                    <input type="password" class="form-control pe-5" id="password" name="password" required>
                                    <span class="position-absolute top-50 end-0 translate-middle-y me-3 cursor-pointer" onclick="togglePassword('password', this)">
                                        <i class="fa-regular fa-eye text-muted"></i>
                                    </span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="education" class="form-label">Education Level</label>
                                <select class="form-select" id="education" name="education">
                                    <option value="High School">High School</option>
                                    <option value="Associate">Associate Degree</option>
                                    <option value="Bachelor">Bachelor's Degree</option>
                                    <option value="Master">Master's Degree</option>
                                    <option value="PhD">Ph.D.</option>
                                </select>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label for="gpa" class="form-label">GPA</label>
                                    <input type="number" min="0.0" max="4.0" step="0.1" class="form-control" id="gpa" name="gpa" placeholder="3.2">
                                    <div class="form-text small">Scale 0.0 – 4.0</div>
                                </div>
                                <div class="col-6">
                                    <label for="exp" class="form-label">Years of Exp.</label>
                                    <input type="number" class="form-control" id="exp" name="exp" required>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4 pt-3 border-top text-center">
                        <button type="submit" class="btn btn-primary px-5 py-2">Create Account</button>
                        <p class="mt-3 text-muted">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword(inputId, iconSpan) {
        const input = document.getElementById(inputId);
        const icon = iconSpan.querySelector('i');
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
