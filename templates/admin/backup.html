{% extends "base.html" %}
{% block title %}Backup & Recovery - RecruitPro{% endblock %}

{% block content %}
<h2 class="fw-bold mb-4"><i class="fa-solid fa-cloud-arrow-up me-2"></i>Backup & Recovery</h2>

<div class="card shadow-sm">
    <div class="card-body text-center p-5">
        <i class="fa-solid fa-database fa-4x text-warning mb-3"></i>
        <h4>Backup Applications Data</h4>
        <p class="text-muted">This will copy all current applications into an archive table for safekeeping.</p>
        <form method="POST" action="{{ url_for('admin.backup_run') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="btn btn-warning btn-lg">
                <i class="fa-solid fa-play me-2"></i> Backup Now
            </button>
        </form>
    </div>
</div>
{% endblock %}
