{% extends "base.html" %}
{% block title %}Saved Jobs - RecruitPro{% endblock %}

{% block content %}
<div class="mb-4">
    <h2 class="fw-bold"><i class="fa-solid fa-heart text-danger me-2"></i>Saved Jobs</h2>
</div>

<div class="row">
    {% for job in jobs %}
    <div class="col-md-6 col-lg-4">
        <div class="card job-card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
                <h5 class="job-card-title mb-1">
                    <a href="{{ url_for('candidate.job_detail', id=job.PositionID) }}" class="text-decoration-none">{{ job.PositionName }}</a>
                </h5>
                <p class="job-card-company mb-3 text-muted">
                    <i class="fa-regular fa-building me-1"></i>{{ job.EmployerName }}
                    <br>
                    <i class="fa-solid fa-location-dot me-1"></i>{{ job.Location }}
                </p>
                <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">
                    <a href="{{ url_for('candidate.job_detail', id=job.PositionID) }}" class="btn btn-sm btn-primary">View Job</a>
                    <form method="POST" action="{{ url_for('candidate.unsave_job', id=job.PositionID) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Remove from saved">
                            <i class="fa-solid fa-heart-crack"></i> Remove
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5 text-muted">
        <i class="fa-regular fa-heart fa-3x mb-3"></i>
        <p class="mb-0">You have no saved jobs.</p>
        <a href="{{ url_for('candidate.search_jobs') }}" class="btn btn-outline-primary mt-3">Browse Jobs</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
